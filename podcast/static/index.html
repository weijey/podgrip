<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>podgrip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1><a href="/">podgrip</a></h1>
  <nav>
    <button id="nav-subscriptions" onclick="showMain()">订阅</button>
    <button id="btn-add" onclick="showAdd()">+ 添加</button>
  </nav>
</header>

<main>
  <section id="main-view">
    <div id="subscription-list"></div>
  </section>

  <section id="detail-view" class="hidden">
    <button class="back" onclick="showMain()">← 返回</button>
    <h2 id="detail-title"></h2>
    <div id="episode-list"></div>
  </section>

  <section id="add-view" class="hidden">
    <button class="back" onclick="showMain()">← 返回</button>
    <h2>添加订阅</h2>
    <form id="add-form" onsubmit="handleAdd(event)">
      <input type="url" id="add-url" placeholder="小宇宙播客链接" required>
      <button type="submit">添加</button>
    </form>
    <p id="add-status" class="dim"></p>
  </section>
</main>

<aside id="download-queue" class="hidden">
  <h3>下载队列</h3>
  <div id="queue-items"></div>
</aside>

<script src="/app.js" type="module"></script>
</body>
</html>
